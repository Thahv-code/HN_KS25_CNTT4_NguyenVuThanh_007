<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="/asset/css/sign-up.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  </head>
  <body>
    <div class="container">
      <h1>Đăng ký tài khoản</h1>

      <form id="registerForm">
        <label for="fullname">Họ và tên</label>
        <input type="text" id="fullname" placeholder=" Nhập họ tên" />
        <div class="error-msg" id="errorFullname"></div>
        <br />
        <br />

        <label for="email">Email</label>
        <input type="text" id="email" placeholder=" Nhập email" />
        <div class="error-msg" id="errorEmail"></div>
        <br />
        <br />

        <label for="password">Mật khẩu</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder=" Nhập mật khẩu" />
          <i class="fas fa-eye" id="togglePassword"></i>
          <div class="error-msg" id="errorPassword"></div>
        </div>
        <br />
        <br />

        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder=" Xác nhận mật khẩu" />
          <i class="fas fa-eye" id="toggleConfirmPassword"></i>
          <div class="error-msg" id="errorConfirmPassword"></div>
        </div>
        <br /><br />
        <br />

        <button type="submit">Đăng ký</button>
      </form>
      <div class="login-link">
        Đã có tài khoản?
        <a href="/asset/pages/auth/sign-in.html">Đăng nhập ngay</a>
      </div>
    </div>
    <script src="/asset/js/sign-up.js"></script>
  </body>
</html>
